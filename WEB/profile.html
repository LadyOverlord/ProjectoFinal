<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/variables.css">
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/paginas/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Perfil do Utilizador</title>
</head>
<body>

    <div class="profile-container">

        <!-- Barra de navegação topo -->
        <div class="topbar">
            <a href="index.html" class="btn-voltar">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Voltar</span>
            </a>
            <h1 class="topbar-title">Meu Perfil</h1>
            <button id="btn-edit-profile" class="btn-settings" title="Definições">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
        </div>

        <!-- Cartão Principal do Utilizador -->
        <div class="user-card">

            <!-- Avatar com botão de upload -->
            <div class="avatar-wrapper">
                <div class="avatar-container" id="avatar-trigger" title="Alterar foto de perfil">
                    <img id="profile-photo" src="" alt="Foto de perfil" class="avatar-img hidden" />
                    <div id="avatar-placeholder" class="avatar-placeholder">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="avatar-overlay">
                        <i class="fa-solid fa-camera"></i>
                        <span>Alterar</span>
                    </div>
                </div>
                <!-- Input de ficheiro escondido -->
                <input type="file" id="photo-input" accept="image/*" style="display:none;" />

                <!-- Loader de upload -->
                <div id="upload-loader" class="upload-loader hidden">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Informações do utilizador -->
            <div class="profile_info">
                <div class="name-row">
                    <h2 id="p-nome">Carregando...</h2>
                    <span id="badge-verified" class="badge-verified hidden" title="Conta verificada">
                        <i class="fa-solid fa-circle-check"></i>
                    </span>
                </div>
                <p id="p-email" class="info-email">
                    <i class="fa-solid fa-envelope"></i>
                    <span>...</span>
                </p>
                <p id="p-local" class="info-location">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>...</span>
                </p>
            </div>

            <!-- Estatísticas rápidas -->
            <div class="stats-row">
                <div class="stat-item">
                    <span id="stat-casos" class="stat-number">0</span>
                    <span class="stat-label">Relatos</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span id="stat-aprovados" class="stat-number">0</span>
                    <span class="stat-label">Aprovados</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span id="stat-pendentes" class="stat-number">0</span>
                    <span class="stat-label">Pendentes</span>
                </div>
            </div>
        </div>

        <!-- Lista de Casos -->
        <div class="my-cases">
            <div class="cases-header">
                <h3><i class="fa-solid fa-bullhorn"></i> Meus Relatos</h3>
                <div class="cases-filter">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="pendente">Pendentes</button>
                    <button class="filter-btn" data-filter="aprovado">Aprovados</button>
                </div>
            </div>
            <div id="cases-list">
                <div class="loading-cases">
                    <div class="spinner"></div>
                    <p>Buscando seus casos...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu de opções (dropdown) -->
    <div class="edit_section" id="edit-menu">
        <div class="edit-menu-header">
            <span>Opções</span>
        </div>
        <button id="btn-change-photo" class="menu-item">
            <i class="fa-solid fa-image"></i>
            Alterar Foto de Perfil
        </button>
        <button id="btn-logout" class="menu-item danger">
            <i class="fa-solid fa-right-from-bracket"></i>
            Sair da Conta
        </button>
        <button id="btn-cancel-edit" class="menu-item cancel">
            <i class="fa-solid fa-xmark"></i>
            Cancelar
        </button>
    </div>

    <!-- Overlay de fundo quando menu aberto -->
    <div class="menu-backdrop hidden" id="menu-backdrop"></div>

    <script src="Scripts/alerts.js"></script>
    <script type="module" src="Scripts/profile.js"></script>
</body>
</html>
