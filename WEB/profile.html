<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/variables.css">
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/paginas/profile.css">

       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
</head>

   

<body>

    <div class="profile-container">

        <div class="voltar_div"><a href="index.html" class="btn-voltar" style="font-size: 20px;"><i class="fa-solid fa-house"></i></a></div>
        
        <!-- Cartão do Usuário -->
        <div class="user-card">
            <i class="fa-solid fa-user-circle" style="font-size: 120px; color: #0c7ab5;"></i>
            <div class="profile_info">
                <span style="display: flex; gap: 8px; align-items: center;">
                    <h2 id="p-nome" style="font-weight: 600; font-size: 25px;">Carregando...</h2>
                    <button id="btn-edit-profile" style="font-size: 30px;"><i class="fa-solid fa-gear"></i></button>
                </span>
                <p id="p-email">...</p>
                <p><i class="fa-solid fa-location-dot"></i> <span id="p-local">...</span></p>
            </div>
           
        </div>

        <!-- Lista de Casos -->
        <div class="my-cases">
            <h3><i class="fa-solid fa-bullhorn"></i> Meus Relatos</h3>
            <div id="cases-list">
                <p>Buscando seus casos...</p>
            </div>
        </div>
    </div>
    <div class="edit_section">
         <button id="btn-logout">Sair da Conta</button>
        <button id="btn-cancel-edit" style="border-top: 1px solid #3333337a;">Cancelar</button>

            
    </div>

    <script src="Scripts/alerts.js"></script>
    <script type="module" src="Scripts/profile.js"></script>
</body>

    <script src="Scripts/profile.js"></script>
</body>
</html>
