<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
     
    <link rel="stylesheet" href="CSS/variables.css">

    <link rel="stylesheet" href="CSS/global.css">

    <link rel="stylesheet" href="CSS/paginas/principal.css">
   
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--=====NAVE======-->
    <header>

        <div class="nav">
            <button class="nave_button_none" id="menu">
             <i class="fa-solid fa-bars"></i>
            </button>
            <div class="search">
                <button class="nave_button_none"><i class="fa-solid fa-magnifying-glass"></i></button>
                <input type="search" placeholder="Procurar desaparecidos">
               </div>
                <button class="nave_button_none" id="bell"><i class="fa-regular fa-bell"></i></button>
                <button class="nave_button" id="user"><i class="fa-solid fa-user"></i></button>
                <button class="nave_button" id="relatar">Relatar desaparecimento</button>
        </div>
    </header>

    <!--======MAIN=======-->
    <section class="main">
        <div class="section_map">

           <div class="mapa">
               <h1>MAPA</h1>
               <img src="imgs/mapa.jpg" alt="">
           </div>

         <div class="destaques">
                <h1>EM DESTAQUE</h1>
                <div class="destaque" id="destaque">
                    <img src="imgs/user.jpg" alt="">
                    <p>User.name</p>
                </div>
          </div>

            <div class="filtros">
                 <h1>FILTROS</h1>
                <div class="filtro">
                    <select name="Municipio" id="Municipio">
                        <option value="" hidden>Municipio</option>
                        <option value="">Cazenga</option>
                        <option value="">Futungo</option>
                        <option value="">Viana</option>
                    </select>
                     <select name="data" id="data">
                        <option value="" hidden>Idade</option>
                        <option value="">1-5</option>
                        <option value="">6-10</option>
                        <option value="">11-16</option>
                    </select>
                     <select name="sexo" id="sexo">
                        <option value="" hidden>Municipio</option>
                        <option value="masculino">Masculin</option>
                        <option value="femenino">Femenino</option>
                    
                    </select>
                </div>

            </div>

         


        </div>

        <div class="section_main">

            <div class="casos_main">
                <div class="desaparecido">
                    <img src="imgs/user.jpg" alt="" id="User_missing">
                    <div>
                        <h4>User.name</h4>
                        <p>User.age</p>
                    </div>
                     <button><i class="fa-solid fa-ellipsis"></i></button>
                </div>

                <img src="imgs/user.jpg" class="main_img" alt="" id="User_missing">

                <div class="missing_dados">
                    <h1>User.name</h1>
                    <div class="dados_1">
                        <h3>Ultimo local vito:</h3>
                        <p></p>
                        </div>

                    <div class="dados_2">
                            <h3>Desapareceu em:</h3>
                            <p></p>
                            </div>

                    <div class="dados_3">
                                <h3>numero de apoios</h3>
                                <p>Apoiam este alerta</p>
                            </div>
                </div>

                <div class="interacao">
                    <button id="apoir">Apoiar</button>

                    <button id="comentar">Comentar</button>

                    <button id="compartilhar">Compartilhar</button>
                </div>

            </div>

        </div>

        <div class="section_anuncio"></div>
    </section>
    
</body>
</html>
